# PwnOxide v5 — AngryOxide + Bull Faces config overlay
# Drop in /etc/pwnagotchi/conf.d/ — pwnagotchi merges these over defaults.toml
# Use `pwnoxide-mode ao|pwn` to toggle this overlay on/off
#
# AO ON  = AngryOxide attacks + bull faces
# AO OFF = bettercap attacks + stock faces (Korean/fancygotchi/whatever)

[bettercap]
disabled = true

# AO display plugins — extract hardcoded AO indicators into toggleable plugins
[main.plugins.ao_layout]
enabled = true

[main.plugins.ao_cursor]
enabled = true

[main.plugins.ao_pwnd]
enabled = true

[main.plugins.ao_compat]
enabled = true

[main.plugins.angryoxide]
enabled = true
binary_path = "/usr/local/bin/angryoxide"
interface = "wlan0mon"
no_setup = true
nexmon_mode = false
output_dir = "/etc/pwnagotchi/handshakes/"
whitelist = ["YourNetwork", "YourNetwork-5G"]

# Disable plugins that are redundant or conflict in AO mode
[main.plugins.walkby]
enabled = false

# fix_services conflicts with AO — it runs modprobe -r brcmfmac on crash,
# which kills the SDIO bus. AO plugin handles its own crash recovery.
[main.plugins.fix_services]
enabled = false

[main.plugins.enable_assoc]
enabled = false

[main.plugins.enable_deauth]
enabled = false

# auto-tune re-enables bettercap deauth/assoc after AO disables them — sabotages AO
[main.plugins.auto-tune]
enabled = false

# Enable wpa-sec for automatic handshake cracking
[main.plugins.wpa-sec]
enabled = true
api_key = "YOUR_WPA_SEC_API_KEY"
api_url = "https://wpa-sec.stanev.org"
download_results = true

[personality]
frame_padding = true
frame_padding_min_bytes = 650
deauth = false
associate = false

# --- Bull faces (PNG mode) ---
# Position moved up to y=16 since we hide the name element
# All 28 mood states mapped to bull head PNGs

[ui.faces]
png = true
position_x = 0
position_y = 16
look_r = ["/etc/pwnagotchi/custom-plugins/faces/look_r.png"]
look_l = ["/etc/pwnagotchi/custom-plugins/faces/look_l.png"]
look_r_happy = ["/etc/pwnagotchi/custom-plugins/faces/look_r_happy.png"]
look_l_happy = ["/etc/pwnagotchi/custom-plugins/faces/look_l_happy.png"]
sleep = ["/etc/pwnagotchi/custom-plugins/faces/sleep.png"]
awake = ["/etc/pwnagotchi/custom-plugins/faces/awake.png"]
bored = ["/etc/pwnagotchi/custom-plugins/faces/bored.png"]
intense = ["/etc/pwnagotchi/custom-plugins/faces/intense.png"]
cool = ["/etc/pwnagotchi/custom-plugins/faces/cool.png"]
